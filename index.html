<!DOCTYPE html>
<html>
<head>
    <style>
        .naytto-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .segmentti { border: 2px solid #333; padding: 20px; text-align: center; font-family: monospace; font-size: 24px; background: #000; color: #0f0; }
    </style>
</head>
<body>
    <div class="naytto-grid" id="container"></div>

    <script>
        // Luodaan 21 näyttöä dynaamisesti
        const container = document.getElementById('container');
        for(let i = 0; i < 21; i++) {
            let el = document.createElement('div');
            el.className = 'segmentti';
            el.id = 'n' + i;
            el.innerText = '0';
            container.appendChild(el);
        }

        // Päivityssilmukka
        async function fetchData() {
            try {
                let res = await fetch('/api/rekisteri');
                let data = await res.text();
                let arvot = data.split("|");
                for(let i = 0; i < 21; i++) {
                    document.getElementById('n' + i).innerText = arvot[i] || '0';
                }
            } catch(e) { console.error("Data-virta katkesi"); }
        }
        setInterval(fetchData, 500);
    </script>
</body>
</html>
